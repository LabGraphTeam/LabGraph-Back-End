# ===============================
# = SERVER CONFIGURATION
# ===============================
server.error.include-stacktrace=never
server.tomcat.accept-count=1
server.tomcat.max-connections=1
server.tomcat.threads.min-spare=1

# ===============================
# = SPRING BOOT CONFIGURATION
# ===============================
spring.main.lazy-initialization=true
spring.jmx.enabled=false
spring.main.banner-mode=off
spring.data.jpa.repositories.bootstrap-mode=lazy
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/lab_api_test
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.clean-disabled=false

# ===============================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ===============================
# = MONITORING
# ===============================
management.endpoints.web.exposure.include=none
management.endpoint.health.show-details=never
management.health.ssl.enabled=false

# ===============================
# = EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
email.to.send.list=your-email@example.com,your2-email@example.com

# ===============================
# = SECURITY CONFIGURATION
# ===============================
api.security.token.secret=${API_SECURITY_TOKEN_SECRET}
api.security.issuer=${API_SECURITY_ISSUER}
